name: Release

# On a v* tag: build the per-platform standalone binaries, publish a GitHub Release with the
# archives, publish the package to PyPI (OIDC trusted publishing), and bump the Homebrew tap.
on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  # Gate the tag on the same headless tests CI runs.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python -m pip install --upgrade pip pytest pillow
      - run: python -m pytest -q

  # One PyInstaller binary per target OS/arch (PyInstaller cannot cross-compile).
  build:
    name: build (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,  os: ubuntu-latest }
          - { name: linux-arm64,   os: ubuntu-24.04-arm }
          - { name: macos-arm64,   os: macos-15 }
          - { name: macos-x86_64,  os: macos-15-intel }
          - { name: windows-x86_64, os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller pillow
      - name: Build one-file binary
        run: pyinstaller packaging/fpga_isv.spec
      - name: Package versioned archive
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          BIN=dist/fpga-isv
          [ "${{ runner.os }}" = "Windows" ] && BIN=dist/fpga-isv.exe
          bash ci/package-release.sh "$VER" "${{ matrix.name }}" "$BIN" release
      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.name }}
          path: |
            release/*.tar.gz
            release/*.zip
          if-no-files-found: error

  # Publish the GitHub Release with all per-platform archives attached.
  publish:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download per-platform archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - run: ls -l release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.tar.gz
            release/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a prerelease suffix (e.g. v0.1.0-rc1) are marked prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}

  # Publish the wheel + sdist to PyPI via OIDC trusted publishing. Kept as a non-reusable job
  # in this workflow because trusted publishing cannot run from a reusable workflow.
  pypi:
    needs: test
    # Final releases only -- a prerelease tag (v*-rc1, v*-alpha, ...) must not burn a PyPI
    # version (the wheel version comes from fpga_isv.__version__, not the tag).
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # mandatory for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Verify the tag matches the package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import fpga_isv; print(fpga_isv.__version__)')"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag v$TAG does not match fpga_isv.__version__ ($PKG) -- bump __version__"; exit 1
          fi
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # Bump the Homebrew formula in the separate tap repo (DFiantWorks/homebrew-fpga-isv) to the
  # new version + per-asset sha256. Skips cleanly if the tap token secret isn't configured.
  homebrew:
    needs: publish
    # Final releases only -- don't push a prerelease formula to the tap.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Download per-platform archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Render formula and push to tap
        shell: bash
        env:
          # Write deploy key scoped to DFiantWorks/homebrew-fpga-isv (not a PAT).
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "HOMEBREW_TAP_DEPLOY_KEY not set -- skipping Homebrew bump."
            exit 0
          fi
          VER="${GITHUB_REF_NAME#v}"
          sha() { shasum -a 256 "release/fpga-isv-$VER-$1.tar.gz" | awk '{print $1}'; }
          SHA_LINUX_X86_64="$(sha linux-x86_64)"
          SHA_LINUX_ARM64="$(sha linux-arm64)"
          SHA_MACOS_ARM64="$(sha macos-arm64)"
          SHA_MACOS_X86_64="$(sha macos-x86_64)"

          sed -e "s/@VERSION@/$VER/g" \
              -e "s/@SHA_LINUX_X86_64@/$SHA_LINUX_X86_64/g" \
              -e "s/@SHA_LINUX_ARM64@/$SHA_LINUX_ARM64/g" \
              -e "s/@SHA_MACOS_ARM64@/$SHA_MACOS_ARM64/g" \
              -e "s/@SHA_MACOS_X86_64@/$SHA_MACOS_X86_64/g" \
              packaging/fpga-isv.rb.tmpl > fpga-isv.rb

          # Authenticate to the tap repo over SSH with the deploy key.
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"

          git clone git@github.com:DFiantWorks/homebrew-fpga-isv.git tap
          mkdir -p tap/Formula
          cp fpga-isv.rb tap/Formula/fpga-isv.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/fpga-isv.rb
          git commit -m "fpga-isv $VER" || { echo "no formula change"; exit 0; }
          git push
